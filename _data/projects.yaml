- title: Molecular Label
  group: featured
  image: images/Re1.jpg
  description: By controlling in vivo proximity chemistry on the cell surface, we aim to reorganize the spatial distribution and clustering states of functional molecules on cell membranes. Increasing their local effective density allows activation thresholds to be surpassed, thereby initiating downstream signaling, promoting cell–cell recognition, and enhancing immune responses.


- title: Immune regulation
  group: featured
  image: images/Re2.jpg
  description: By controlling in vivo proximity chemistry on the cell surface, we reorganize the spatial distribution and clustering of functional molecules. This increases their local effective density, enabling activation thresholds to be exceeded and thereby initiating downstream signaling, promoting cell–cell recognition, and enhancing immune responses.
 

